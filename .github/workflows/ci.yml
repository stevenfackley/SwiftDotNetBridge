name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  dotnet-tests:
    name: .NET tests (managed, no AOT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore, build, test
        run: dotnet test SwiftDotNetBridge.slnx -c Release

  mac-bridge:
    name: xcframework + Swift round-trip (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Toolchain versions
        run: |
          dotnet --version
          xcodebuild -version
          swift --version
      - name: Native AOT smoke test (exports + loopback /health)
        run: |
          chmod +x build/*.sh
          ./build/verify-native.sh
      - name: Build xcframework (iOS device + simulator, macOS, Mac Catalyst)
        run: ./build/build-xcframework.sh
      - name: Swift round-trip tests (Swift -> C ABI -> .NET -> loopback)
        run: |
          cd swift
          swift test

  fuzz:
    name: Parser fuzzing (SharpFuzz, 60s)
    runs-on: ubuntu-latest
    # Non-blocking: a clean 60s fuzz finds nothing most runs, and we don't want fuzz exploration
    # gating merges. The deterministic ParserFuzzTests in dotnet-tests is the gate. But NO `|| true`
    # here — a crash or a broken toolchain shows as a failed (red) job, not fake-green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install SharpFuzz CLI + clang
        run: |
          dotnet tool install --global SharpFuzz.CommandLine
          sudo apt-get update && sudo apt-get install -y clang
      - name: Build fuzz target
        run: dotnet build fuzz/DotnetBridge.Fuzz -c Release
      - name: Build the libfuzzer-dotnet driver
        run: |
          # SharpFuzz needs this native libFuzzer driver to do real coverage-guided fuzzing;
          # without it the managed target falls back to single-input replay (and crashes on libFuzzer args).
          wget -q https://raw.githubusercontent.com/Metalnem/sharpfuzz/master/scripts/libfuzzer-dotnet.cc
          clang -g -O2 -fsanitize=fuzzer libfuzzer-dotnet.cc -o "$GITHUB_WORKSPACE/libfuzzer-dotnet"
      - name: Instrument + 60s fuzz run
        working-directory: fuzz/DotnetBridge.Fuzz/bin/Release/net10.0
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          sharpfuzz DotnetBridge.Host.dll
          mkdir -p corpus
          printf 'GET /health HTTP/1.1\r\nHost: 127.0.0.1\r\n\r\n' > corpus/seed
          "$GITHUB_WORKSPACE/libfuzzer-dotnet" --target_path="$PWD/DotnetBridge.Fuzz" \
            -max_total_time=60 -timeout=10 corpus
